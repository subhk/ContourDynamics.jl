name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - threads ${{ matrix.threads }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Oldest supported + single-threaded for race detection
          - version: "1.10"
            os: ubuntu-latest
            threads: 1
          # Latest + multi-threaded
          - version: "1.12"
            os: ubuntu-latest
            threads: 2
          # macOS platform coverage
          - version: "1.12"
            os: macos-latest
            threads: 2
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          JULIA_NUM_THREADS: ${{ matrix.threads }}
